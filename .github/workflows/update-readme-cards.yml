name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=KhoaTheBest&show_icons=true&theme=dark&bg_color=000000&title_color=10B981&icon_color=10B981&text_color=e2e8f0&border_color=1e293b&count_private=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_PAT }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=KhoaTheBest&layout=compact&theme=dark&bg_color=000000&title_color=3b82f6&icon_color=3b82f6&text_color=e2e8f0&border_color=1e293b&count_private=true&hide=html,css,scss,shell,ruby&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg || true
          git commit -m "chore: update README stats with filtered programming languages" || exit 0
          git push origin main
